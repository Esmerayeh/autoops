<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AutoOps AI – Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <div class="auth-shell">
      <div class="auth-card">
        <div class="auth-header">
          <div class="auth-title">AutoOps AI</div>
          <div class="auth-subtitle">Sign in to access the dashboard</div>
        </div>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form class="auth-form" method="POST">
          <label class="auth-label">
            <span>Username</span>
            <input class="auth-input" name="username" autocomplete="username" required />
          </label>

          <label class="auth-label">
            <span>Password</span>
            <input
              class="auth-input"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </label>

          <button class="btn btn-primary" type="submit">Login</button>
        </form>

        <div class="auth-hint">
          Don't have an account?
          <a class="auth-link" href="{{ url_for('signup') }}">Sign up</a>
        </div>
      </div>
    </div>
  </body>
  </html>
